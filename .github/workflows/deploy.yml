name: Deploy Production to Yandex Object Storage

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rollback_run_id:
        description: "GitHub Run ID for rollback (leave empty for regular deploy)"
        required: false
        type: string
      rollback_artifact_name:
        description: "Artifact name used for rollback"
        required: false
        default: "dist-build"
        type: string
      reason:
        description: "Reason for manual run"
        required: false
        type: string
      target_environment:
        description: "GitHub Environment name"
        required: false
        default: "production"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

env:
  YC_ENDPOINT: https://storage.yandexcloud.net
  DIST_DIR: dist
  DEFAULT_ARTIFACT_NAME: dist-build

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'production' }}
    env:
      YC_BUCKET: ${{ secrets.YC_BUCKET }}
      YC_REGION: ${{ secrets.YC_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.YC_REGION }}
      PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
      PRODUCTION_WWW_URL: ${{ secrets.PRODUCTION_WWW_URL }}
      ROLLBACK_RUN_ID: ${{ github.event.inputs.rollback_run_id }}
      ROLLBACK_ARTIFACT_NAME: ${{ github.event.inputs.rollback_artifact_name }}
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          for var in YC_BUCKET YC_REGION AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret or env: $var"
              exit 1
            fi
          done
          echo "Target bucket: ${YC_BUCKET}"

      - name: Checkout repository
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_run_id == '' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_run_id == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_run_id == '' }}
        shell: bash
        run: npm ci

      - name: Build production bundle
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_run_id == '' }}
        shell: bash
        run: npm run build

      - name: Download rollback artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.rollback_artifact_name }}
          run-id: ${{ github.event.inputs.rollback_run_id }}
          github-token: ${{ github.token }}
          path: .

      - name: Validate dist output
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${DIST_DIR}" ]; then
            echo "::error::dist directory is missing"
            exit 1
          fi
          if [ ! -f "${DIST_DIR}/index.html" ]; then
            echo "::error::dist/index.html is missing"
            exit 1
          fi
          echo "dist content:"
          ls -la "${DIST_DIR}"

      - name: Upload build artifact for rollback
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_run_id == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEFAULT_ARTIFACT_NAME }}
          path: dist
          retention-days: 14

      - name: Install AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Configure AWS credentials
        shell: bash
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id "${AWS_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${AWS_SECRET_ACCESS_KEY}"
          aws configure set default.region "${AWS_DEFAULT_REGION}"
          aws configure list

      - name: Verify bucket website hosting config (warning only)
        continue-on-error: true
        shell: bash
        run: |
          set +e
          echo "Checking website hosting config for bucket: ${YC_BUCKET}"
          WEBSITE_CONFIG_OUTPUT="$(aws s3api get-bucket-website \
            --bucket "${YC_BUCKET}" \
            --endpoint-url "${YC_ENDPOINT}" 2>&1)"
          WEBSITE_CONFIG_EXIT="$?"

          if [ "${WEBSITE_CONFIG_EXIT}" -ne 0 ]; then
            echo "::warning::Unable to read website hosting config from Yandex Object Storage. Deploy will continue."
            echo "aws s3api get-bucket-website exit code: ${WEBSITE_CONFIG_EXIT}"
            echo "${WEBSITE_CONFIG_OUTPUT}"
          else
            echo "Website hosting config response:"
            echo "${WEBSITE_CONFIG_OUTPUT}"
          fi

          exit 0

      - name: Deploy build to Yandex Object Storage
        shell: bash
        run: |
          set -euo pipefail
          set -x

          retry() {
            local attempts="$1"
            local base_delay="$2"
            shift 2
            local try=1
            until "$@"; do
              if [ "${try}" -ge "${attempts}" ]; then
                echo "::error::Command failed after ${attempts} attempts: $*"
                return 1
              fi
              local sleep_for=$((base_delay * try))
              echo "Attempt ${try}/${attempts} failed. Retry in ${sleep_for}s..."
              sleep "${sleep_for}"
              try=$((try + 1))
            done
          }

          retry 4 4 aws s3 sync dist/ s3://"${YC_BUCKET}" --delete --endpoint-url=https://storage.yandexcloud.net --debug

      - name: MIME hardening pass
        shell: bash
        run: |
          set -euo pipefail

          mime_sync() {
            local include_pattern="$1"
            local content_type="$2"
            local cache_control="$3"
            aws s3 cp "${DIST_DIR}" "s3://${YC_BUCKET}" \
              --recursive \
              --endpoint-url "${YC_ENDPOINT}" \
              --exclude "*" \
              --include "${include_pattern}" \
              --content-type "${content_type}" \
              --cache-control "${cache_control}" \
              --debug
          }

          mime_sync "assets/*.js" "text/javascript" "public,max-age=31536000,immutable"
          mime_sync "assets/*.css" "text/css" "public,max-age=31536000,immutable"
          mime_sync "*.svg" "image/svg+xml" "no-cache,no-store,must-revalidate"
          mime_sync "assets/*.svg" "image/svg+xml" "public,max-age=31536000,immutable"
          mime_sync "assets/*.woff2" "font/woff2" "public,max-age=31536000,immutable"
          mime_sync "assets/*.webp" "image/webp" "public,max-age=31536000,immutable"
          mime_sync "assets/*.json" "application/json" "public,max-age=31536000,immutable"
          mime_sync "*.json" "application/json" "no-cache,no-store,must-revalidate"
          mime_sync "assets/*.mp4" "video/mp4" "public,max-age=31536000,immutable"

      - name: Verify deployment health
        shell: bash
        run: |
          set -euo pipefail
          PRIMARY_URL="${PRODUCTION_URL:-https://${YC_BUCKET}.website.yandexcloud.net}"
          WWW_URL="${PRODUCTION_WWW_URL:-}"

          verify_url() {
            local target_url="${1%/}"
            local label="$2"
            local output_file="/tmp/${label}.html"
            local status_code

            status_code="$(curl -sS -L -o "${output_file}" -w "%{http_code}" --retry 5 --retry-all-errors --retry-delay 3 "${target_url}/")"

            if [ "${status_code}" != "200" ] && [ "${status_code}" != "301" ] && [ "${status_code}" != "302" ]; then
              echo "::error::${label} returned HTTP ${status_code} (${target_url})"
              return 1
            fi

            if [ "${status_code}" = "200" ] && ! grep -Eq 'assets/.*\.(js|css)' "${output_file}"; then
              echo "::error::${label} index does not contain expected Vite assets references (${target_url})"
              return 1
            fi

            echo "${label} health check passed: ${status_code} (${target_url})"
          }

          verify_url "${PRIMARY_URL}" "primary"
          if [ -n "${WWW_URL}" ]; then
            verify_url "${WWW_URL}" "www"
          fi

          echo "Deployment verification passed."
          echo "Primary URL: ${PRIMARY_URL}"
          if [ -n "${WWW_URL}" ]; then
            echo "WWW URL: ${WWW_URL}"
          fi

      - name: Deployment summary
        shell: bash
        run: |
          set -euo pipefail
          PRIMARY_URL="${PRODUCTION_URL:-https://${YC_BUCKET}.website.yandexcloud.net}"
          WWW_URL="${PRODUCTION_WWW_URL:-not-configured}"
          FALLBACK_URL="http://${YC_BUCKET}.website.yandexcloud.net"
          {
            echo "## Yandex Cloud deployment"
            echo ""
            echo "- Bucket: \`${YC_BUCKET}\`"
            echo "- Region: \`${YC_REGION}\`"
            echo "- Endpoint: \`${YC_ENDPOINT}\`"
            echo "- Primary website: ${PRIMARY_URL}"
            echo "- WWW website: ${WWW_URL}"
            echo "- Fallback website: ${FALLBACK_URL}"
            echo "- Mirror: http://website.yandexcloud.net/${YC_BUCKET}/"
            if [ -n "${ROLLBACK_RUN_ID:-}" ]; then
              echo "- Mode: rollback from run \`${ROLLBACK_RUN_ID}\`"
            else
              echo "- Mode: regular deploy"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
